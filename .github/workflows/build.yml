name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest  # Recomendado para SonarCloud
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para relevancia del análisis

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@2c1f7a3b7e8f9d1a0b2c3d4e5f6a7b8c9d0e1f2  # SHA fijo
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
